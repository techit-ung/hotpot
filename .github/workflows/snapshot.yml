name: Snapshot Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: snapshot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DOCKER_IMAGE: techitung/hotpot

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - uses: gradle/actions/setup-gradle@v4

      - name: Read Gradle version
        id: version
        shell: bash
        run: |
          project_version="$(grep '^version=' gradle.properties | cut -d'=' -f2- | tr -d '[:space:]')"

          if [[ -z "$project_version" ]]; then
            echo "Unable to read version from gradle.properties"
            exit 1
          fi

          echo "project_version=$project_version" >> "$GITHUB_OUTPUT"

          if [[ "$project_version" == *-SNAPSHOT ]]; then
            echo "is_snapshot=true" >> "$GITHUB_OUTPUT"
            echo "docker_version_tag=$project_version" >> "$GITHUB_OUTPUT"
            echo "Publishing snapshot version $project_version"
          else
            echo "is_snapshot=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Snapshot publish skipped::gradle.properties version '$project_version' is not a -SNAPSHOT version."
          fi

      - name: Build and publish snapshot
        if: steps.version.outputs.is_snapshot == 'true'
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew build publishToMavenCentral

      - name: Set up Docker Buildx
        if: steps.version.outputs.is_snapshot == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.version.outputs.is_snapshot == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and publish Docker image
        if: steps.version.outputs.is_snapshot == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: standalone/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.docker_version_tag }}
            ${{ env.DOCKER_IMAGE }}:snapshot
