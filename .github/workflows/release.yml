name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DOCKER_IMAGE: techitung/hotpot

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - uses: gradle/actions/setup-gradle@v4

      - name: Validate tag matches Gradle version
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use the form vX.Y.Z"
            exit 1
          fi

          tag_version="${tag#v}"
          project_version="$(grep '^version=' gradle.properties | cut -d'=' -f2- | tr -d '[:space:]')"

          if [[ -z "$project_version" ]]; then
            echo "Unable to read version from gradle.properties"
            exit 1
          fi

          if [[ "$project_version" == *-SNAPSHOT ]]; then
            echo "Release workflow cannot publish a SNAPSHOT version: $project_version"
            exit 1
          fi

          if [[ "$project_version" != "$tag_version" ]]; then
            echo "Tag version $tag_version does not match gradle.properties version $project_version"
            exit 1
          fi

          echo "project_version=$project_version" >> "$GITHUB_OUTPUT"
          echo "docker_version_tag=v$project_version" >> "$GITHUB_OUTPUT"

      - name: Build and publish release
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew build publishAndReleaseToMavenCentral

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: standalone/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.docker_version_tag }}
            ${{ env.DOCKER_IMAGE }}:latest
